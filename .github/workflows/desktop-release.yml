# 当你在 GitHub 上发布一个 Release（tag 命名为 vX.Y.Z）时触发：构建
# FlashDesk 的桌面目标，并把安装包作为资产上传到这个已发布的 Release。
#
# 用法：在 Releases 页面创建并「发布」一个 Release，tag 命名为 vX.Y.Z
# （例如 v0.1.0）。tag 前缀不是 v 的 Release 会被忽略，避免非版本 Release 误触发
# 桌面构建。
name: desktop-release

on:
  release:
    types: [published]

# 同一个 Release 若被重复发布/编辑，取消上一次仍在进行的构建。
concurrency:
  group: desktop-release-${{ github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  build:
    # 仅当 Release 的 tag 以 v 开头时才构建。
    if: startsWith(github.event.release.tag_name, 'v')
    permissions:
      # 上传资产到 Release 需要写权限。
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            arch: x64
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            arch: x64
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            arch: arm64
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            arch: x64
          - platform: ubuntu-22.04-arm
            rust_target: aarch64-unknown-linux-gnu
            arch: arm64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 拉取该 Release 对应 tag 的代码，确保构建的是发布点的版本。
          ref: ${{ github.event.release.tag_name }}

      # Tauri v2 在 Linux 上需要 webkit2gtk 4.1 + 托盘/appindicator + rsvg + patchelf。
      # 在 x86_64 与 arm64 两种 Ubuntu runner 上都原生安装。
      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and upload installers to the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- 可选：updater 签名（接入 updater 插件后再取消注释）---
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # 直接调用 Tauri CLI，避免依赖 package.json 中的 tauri 脚本细节。
          tauriScript: bunx tauri
          # 把产物上传到「当前这个已发布的 Release」，不新建 Release。
          releaseId: ${{ github.event.release.id }}
          # 项目尚未接入 updater 插件，关闭 latest.json 生成。
          includeUpdaterJson: false
          assetNamePattern: "FlashDesk_${{ github.event.release.tag_name }}_${{ matrix.arch }}[ext]"
          args: --target ${{ matrix.rust_target }}

      - name: Package Windows portable app
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}"
          $portableDir = "portable"
          $portableName = "FlashDesk_${version}_${{ matrix.arch }}_portable"
          $exe = "src-tauri\target\${{ matrix.rust_target }}\release\flashdesk.exe"
          $zip = "${portableName}.zip"

          if (!(Test-Path $exe)) {
            throw "Portable executable not found: $exe"
          }

          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item $exe "$portableDir\FlashDesk.exe"
          Compress-Archive -Path "$portableDir\FlashDesk.exe" -DestinationPath $zip -Force

      - name: Upload Windows portable app
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.event.release.tag_name }}"
          $zip = "FlashDesk_${version}_${{ matrix.arch }}_portable.zip"
          gh release upload "${{ github.event.release.tag_name }}" $zip --clobber
